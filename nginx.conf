server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Astro genera <slug>/index.html para cada página → try_files cubre rutas sin trailing slash
  location / {
    try_files $uri $uri/ $uri.html =404;
  }

  # Cache largo para assets fingerprinted
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location ~* \.(?:css|js|woff2?|ttf|otf|eot|jpg|jpeg|png|webp|avif|svg|ico)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }

  # Páginas HTML: revalidación cortita
  location ~* \.html$ {
    add_header Cache-Control "public, max-age=300, must-revalidate";
  }

  # Seguridad básica
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Errores
  error_page 404 /404.html;
  location = /404.html {
    internal;
  }
}
